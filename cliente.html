<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lido Prenotazioni">
<meta name="theme-color" content="#0077B6">
<title>Lido Prenotazioni</title>
<style>
  :root {
    --sea: #0077B6; --sea-dark: #005F92; --sand: #F4E0B5;
    --text: #1A1A2E; --text-light: #5A6A7A;
    --free: #48CAE4; --booked: #E76F51; --occupied: #B5451B;
    --family: #7B61FF; --selected: #F4D35E;
    --radius: 10px; --shadow: 0 2px 12px rgba(0,119,182,0.13);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #EBF7FC; color: var(--text); min-height: 100vh; }

  .header { background: var(--sea); color: white; padding: 14px 18px 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
  .header-title { font-size: 18px; font-weight: 800; }
  .header-sub { font-size: 12px; opacity: 0.75; margin-top: 2px; }

  .main { padding: 16px; }

  /* LOADING */
  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 14px; }
  .spinner { width: 40px; height: 40px; border: 4px solid #D0DDE8; border-top-color: var(--sea); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text-light); }

  /* DATE BAR */
  .date-bar { background: white; border-radius: var(--radius); padding: 12px 14px; margin-bottom: 14px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 10px; }
  .date-bar-label { font-size: 12px; font-weight: 700; color: var(--text-light); white-space: nowrap; }
  .date-bar input[type="date"] { flex: 1; padding: 9px 12px; border: 1.5px solid #D0DDE8; border-radius: 8px; font-size: 15px; font-weight: 700; color: var(--sea); outline: none; -webkit-appearance: none; background: #F7FAFC; }
  .date-bar input[type="date"]:focus { border-color: var(--sea); }
  .date-today-btn { background: var(--sea); color: white; border: none; padding: 9px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }

  /* ZONA */
  .zona-selector { display: flex; gap: 10px; margin-bottom: 14px; }
  .zona-btn { flex: 1; padding: 11px 8px; border-radius: 12px; border: 2px solid #D0DDE8; background: white; font-size: 13px; font-weight: 700; color: var(--text-light); cursor: pointer; text-align: center; }
  .zona-btn.active-normal { background: var(--sea); border-color: var(--sea); color: white; }
  .zona-btn.active-family { background: var(--family); border-color: var(--family); color: white; }

  /* LEGENDA */
  .legenda { display: flex; gap: 10px; align-items: center; background: white; padding: 10px 14px; border-radius: var(--radius); margin-bottom: 14px; box-shadow: var(--shadow); flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-light); }
  .leg-dot { width: 15px; height: 15px; border-radius: 4px; flex-shrink: 0; }

  /* MAPPA */
  .map-section-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 6px 10px; border-radius: 6px; margin-bottom: 8px; display: inline-block; }
  .map-section-label.normale { background: #E0F4FB; color: var(--sea); }
  .map-section-label.family { background: #EDE8FF; color: var(--family); }
  .map-container { background: white; border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); overflow-x: auto; margin-bottom: 12px; }
  .map-info { text-align: center; font-size: 12px; color: var(--text-light); margin-bottom: 10px; }
  .map-grid { display: inline-flex; flex-direction: column; gap: 6px; min-width: 100%; }
  .map-row { display: flex; align-items: center; gap: 6px; }
  .row-label { font-size: 11px; font-weight: 700; color: var(--text-light); width: 22px; text-align: center; flex-shrink: 0; }
  .ombrellone { width: 46px; height: 50px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-weight: 700; border: 2px solid transparent; flex-shrink: 0; transition: transform 0.1s; }
  .ombrellone:active { transform: scale(0.92); }
  .ombrellone .omb-icon { font-size: 18px; line-height: 1; }
  .ombrellone .omb-num { font-size: 9px; margin-top: 1px; }
  .ombrellone .omb-ora { font-size: 8px; margin-top: 1px; opacity: 0.9; }
  .ombrellone.free { background: var(--free); color: white; }
  .ombrellone.free-family { background: var(--family); color: white; }
  .ombrellone.booked { background: var(--booked); color: white; cursor: not-allowed; }
  .ombrellone.occupied { background: var(--occupied); color: white; cursor: not-allowed; }
  .ombrellone.selected { background: var(--selected); color: var(--text); border-color: #E8B500; box-shadow: 0 0 0 3px rgba(244,211,94,0.35); }
  .ombrellone.disabled { background: #D0D8E0; cursor: default; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,30,60,0.55); z-index: 200; padding: 20px; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 18px 18px 14px 14px; width: 100%; max-width: 460px; padding: 24px 20px 28px; box-shadow: 0 -4px 32px rgba(0,0,0,0.18); animation: slideUp 0.25s ease; max-height: 92vh; overflow-y: auto; }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: var(--text-light); margin-bottom: 14px; }
  .zona-badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 14px; }
  .zona-badge.normale { background: #E0F4FB; color: var(--sea); }
  .zona-badge.family { background: #EDE8FF; color: var(--family); }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-light); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .field input { width: 100%; padding: 12px 14px; border: 1.5px solid #D0DDE8; border-radius: 10px; font-size: 16px; color: var(--text); background: #F7FAFC; outline: none; -webkit-appearance: none; }
  .field input:focus { border-color: var(--sea); background: white; }
  .field-date-display { background: #E8F4FB; border-radius: 10px; padding: 12px 14px; font-size: 15px; font-weight: 700; color: var(--sea); }
  .btn-prenota { width: 100%; background: var(--sea); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 6px; }
  .btn-prenota.family-mode { background: var(--family); }
  .btn-prenota:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-annulla { width: 100%; background: none; color: var(--text-light); border: none; padding: 12px; font-size: 14px; cursor: pointer; margin-top: 4px; }

  /* CONFERMA */
  .conferma-box { text-align: center; padding: 8px 0 4px; }
  .conferma-icon { font-size: 52px; margin-bottom: 10px; }
  .conferma-title { font-size: 20px; font-weight: 800; color: var(--sea); margin-bottom: 6px; }
  .conferma-sub { font-size: 14px; color: var(--text-light); margin-bottom: 20px; }
  .codice-box { background: var(--sand); border-radius: 14px; padding: 18px 20px; margin-bottom: 18px; }
  .codice-label { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .codice-value { font-size: 36px; font-weight: 800; letter-spacing: 8px; color: var(--sea); }
  .codice-info { font-size: 12px; color: var(--text-light); margin-top: 6px; line-height: 1.6; }
  .dettagli-prenota { font-size: 14px; color: var(--text); margin-bottom: 18px; line-height: 1.8; text-align: left; background: #F7FAFC; border-radius: 10px; padding: 14px 16px; }
  .btn-email { display: block; width: 100%; background: var(--sea); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 10px; text-decoration: none; text-align: center; }
  .btn-chiudi-conf { width: 100%; background: #EBF7FC; color: var(--sea); border: none; padding: 13px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-light); font-size: 14px; }
  .empty-icon { font-size: 44px; margin-bottom: 10px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1A1A2E; color: white; padding: 12px 22px; border-radius: 24px; font-size: 14px; font-weight: 600; z-index: 999; transition: transform 0.3s ease; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,0.25); }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (min-width: 600px) {
    .modal { max-width: 420px; margin: auto; border-radius: 18px; }
    .modal-overlay { align-items: center; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title" id="headerTitle">🌊 Prenota il tuo Ombrellone</div>
  <div class="header-sub">Seleziona data e posto</div>
</div>

<div class="main">
  <div id="appContent">
    <div class="loading-screen">
      <div class="spinner"></div>
      <div class="loading-text">Caricamento disponibilità...</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ===== FIREBASE CONFIG =====
const firebaseConfig = {
  apiKey: "AIzaSyCJ4vGsoBwtf8tv5Bvj4s17UX2sqUl-ExA",
  authDomain: "gestione-lido-7c399.firebaseapp.com",
  projectId: "gestione-lido-7c399",
  storageBucket: "gestione-lido-7c399.firebasestorage.app",
  messagingSenderId: "887337288477",
  appId: "1:887337288477:web:a0531335b5150d1f0917f4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== STATO =====
var config = null;
var prenotazioniData = {};   // { "A-1": { ...dati } } per la data corrente
var zonaAttiva = 'normale';
var mappaData = '';
var selectedPostazione = null;
var unsubscribe = null;

// ===== UTILS =====
function todayStr() {
  var d = new Date();
  var mm = ('0' + (d.getMonth()+1)).slice(-2);
  var dd = ('0' + d.getDate()).slice(-2);
  return d.getFullYear() + '-' + mm + '-' + dd;
}
function formatDataIT(str) {
  if (!str) return '';
  var p = str.split('-');
  return p[2] + '/' + p[1] + '/' + p[0];
}
function generaCodice() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var code = '';
  for (var i = 0; i < 5; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
  return code;
}
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(function() { t.className = 'toast'; }, 2800);
}

// ===== CARICA CONFIG DA FIREBASE =====
async function loadConfig() {
  try {
    var snap = await getDoc(doc(db, 'config', 'lido'));
    if (snap.exists()) {
      config = snap.data();
    } else {
      // config di default
      config = {
        nomeLido: 'Lido Prenotazioni',
        emailGestore: '',
        whatsapp: '',
        pin: '1234',
        rows: [
          { name: 'A', count: 8, zona: 'normale' },
          { name: 'B', count: 8, zona: 'normale' },
          { name: 'C', count: 8, zona: 'family' },
          { name: 'D', count: 6, zona: 'family' }
        ]
      };
      await setDoc(doc(db, 'config', 'lido'), config);
    }
    document.getElementById('headerTitle').textContent = '🌊 ' + config.nomeLido;
  } catch(e) {
    showToast('⚠️ Errore connessione Firebase');
  }
}

// ===== ASCOLTA PRENOTAZIONI PER DATA =====
function listenPrenotazioni(data) {
  if (unsubscribe) unsubscribe();
  unsubscribe = onSnapshot(
    query(collection(db, 'prenotazioni'), where('data', '==', data)),
    function(snapshot) {
      prenotazioniData = {};
      snapshot.forEach(function(docSnap) {
        var d = docSnap.data();
        prenotazioniData[d.posto] = d;
      });
      renderMap();
    },
    function(err) { showToast('⚠️ Errore caricamento dati'); }
  );
}

// ===== INIT =====
async function init() {
  await loadConfig();
  mappaData = todayStr();
  renderApp();
  listenPrenotazioni(mappaData);
}

// ===== RENDER APP =====
function renderApp() {
  var html =
    '<div class="date-bar">' +
    '<div class="date-bar-label">📅 Data</div>' +
    '<input type="date" id="mappaData" value="' + mappaData + '" onchange="onDataChange()">' +
    '<button class="date-today-btn" onclick="setOggi()">Oggi</button>' +
    '</div>' +
    '<div class="zona-selector">' +
    '<button class="zona-btn active-normal" id="zonaBtnNormale" onclick="setZona(\'normale\')">🌊 Normale</button>' +
    '<button class="zona-btn" id="zonaBtnFamily" onclick="setZona(\'family\')">👨‍👩‍👧 Family</button>' +
    '</div>' +
    '<div class="legenda">' +
    '<div class="leg-item"><div class="leg-dot" style="background:var(--free)"></div> Libero</div>' +
    '<div class="leg-item"><div class="leg-dot" style="background:var(--family)"></div> Family</div>' +
    '<div class="leg-item"><div class="leg-dot" style="background:var(--booked)"></div> Prenotato</div>' +
    '</div>' +
    '<div id="mapWrapper"></div>';
  document.getElementById('appContent').innerHTML = html;
  renderMap();
}

function onDataChange() {
  mappaData = document.getElementById('mappaData').value;
  listenPrenotazioni(mappaData);
}

function setOggi() {
  mappaData = todayStr();
  document.getElementById('mappaData').value = mappaData;
  listenPrenotazioni(mappaData);
}

// ===== ZONA =====
window.setZona = function(z) {
  zonaAttiva = z;
  var nb = document.getElementById('zonaBtnNormale');
  var fb = document.getElementById('zonaBtnFamily');
  if (nb) nb.className = 'zona-btn' + (z === 'normale' ? ' active-normal' : '');
  if (fb) fb.className = 'zona-btn' + (z === 'family' ? ' active-family' : '');
  renderMap();
};

// ===== MAPPA =====
function renderMap() {
  var wrapper = document.getElementById('mapWrapper');
  if (!wrapper || !config) return;
  wrapper.innerHTML = '';
  var rows = config.rows || [];
  var zonaRows = rows.filter(function(r) { return (r.zona || 'normale') === zonaAttiva; });
  if (zonaRows.length === 0) {
    wrapper.innerHTML = '<div class="empty-state"><div class="empty-icon">🌊</div>Nessuna fila per questa zona</div>';
    return;
  }
  var labelEl = document.createElement('div');
  labelEl.className = 'map-section-label ' + zonaAttiva;
  labelEl.textContent = zonaAttiva === 'family' ? '👨‍👩‍👧 Zona Family' : '🌊 Zona Normale';
  wrapper.appendChild(labelEl);
  var container = document.createElement('div');
  container.className = 'map-container';
  var infoEl = document.createElement('div');
  infoEl.className = 'map-info';
  infoEl.textContent = 'Disponibilità per il ' + formatDataIT(mappaData);
  container.appendChild(infoEl);
  var grid = document.createElement('div');
  grid.className = 'map-grid';
  var maxCols = 0;
  zonaRows.forEach(function(r) { if (r.count > maxCols) maxCols = r.count; });
  // header numeri
  var hRow = document.createElement('div'); hRow.className = 'map-row';
  var sp = document.createElement('div'); sp.style.width = '22px'; sp.style.flexShrink = '0';
  hRow.appendChild(sp);
  for (var c = 1; c <= maxCols; c++) {
    var lbl = document.createElement('div'); lbl.className = 'row-label'; lbl.textContent = c;
    hRow.appendChild(lbl);
  }
  grid.appendChild(hRow);

  zonaRows.forEach(function(row) {
    var rowEl = document.createElement('div'); rowEl.className = 'map-row';
    var rLbl = document.createElement('div'); rLbl.className = 'row-label'; rLbl.textContent = row.name;
    rowEl.appendChild(rLbl);
    for (var ci = 1; ci <= row.count; ci++) {
      var posto = row.name + '-' + ci;
      var prenot = prenotazioniData[posto];
      var div = document.createElement('div'); div.className = 'ombrellone';
      if (selectedPostazione === posto) {
        div.className += ' selected';
        div.innerHTML = '<div class="omb-icon">⛱️</div><div class="omb-num">' + row.name + ci + '</div>';
      } else if (prenot && prenot.checkin) {
        div.className += ' occupied';
        div.innerHTML = '<div class="omb-icon" style="font-size:16px;font-weight:900">✕</div><div class="omb-num">' + row.name + ci + '</div><div class="omb-ora">' + (prenot.checkinOra||'') + '</div>';
      } else if (prenot) {
        div.className += ' booked';
        div.innerHTML = '<div class="omb-icon">⛱️</div><div class="omb-num">' + row.name + ci + '</div>';
      } else {
        div.className += (zonaAttiva === 'family' ? ' free-family' : ' free');
        div.innerHTML = '<div class="omb-icon">⛱️</div><div class="omb-num">' + row.name + ci + '</div>';
        (function(p) { div.onclick = function() { selectPostazione(p); }; })(posto);
      }
      rowEl.appendChild(div);
    }
    for (var ci2 = row.count+1; ci2 <= maxCols; ci2++) {
      var emp = document.createElement('div'); emp.className = 'ombrellone disabled';
      emp.innerHTML = '<div class="omb-icon" style="opacity:0.25">⛱️</div>';
      rowEl.appendChild(emp);
    }
    grid.appendChild(rowEl);
  });
  container.appendChild(grid);
  wrapper.appendChild(container);
}

function selectPostazione(posto) {
  selectedPostazione = posto;
  renderMap();
  openModalPrenota(posto);
}

// ===== MODAL =====
function openModalPrenota(posto) {
  var isFamily = zonaAttiva === 'family';
  var badgeText = isFamily ? '👨‍👩‍👧 Zona Family' : '🌊 Zona Normale';
  var dataLabel = formatDataIT(mappaData);
  var modal = document.getElementById('modalContent');
  modal.innerHTML =
    '<div class="modal-title">Prenota Ombrellone ' + posto.replace('-','') + '</div>' +
    '<div class="modal-sub">Nessun pagamento richiesto ora</div>' +
    '<span class="zona-badge ' + (isFamily?'family':'normale') + '">' + badgeText + '</span>' +
    '<div class="field"><label>Data</label><div class="field-date-display">📅 ' + dataLabel + '</div></div>' +
    '<div class="field"><label>Nome</label><input type="text" id="fNome" placeholder="Mario" autocomplete="given-name"></div>' +
    '<div class="field"><label>Cognome</label><input type="text" id="fCognome" placeholder="Rossi" autocomplete="family-name"></div>' +
    '<div class="field"><label>Cellulare</label><input type="tel" id="fTel" placeholder="+39 333 1234567" autocomplete="tel"></div>' +
    '<div class="field"><label>La tua Email</label><input type="email" id="fEmail" placeholder="mario@email.com" autocomplete="email"></div>' +
    '<button class="btn-prenota' + (isFamily?' family-mode':'') + '" id="btnConferma" onclick="confermaPrenota(\'' + posto + '\',\'' + zonaAttiva + '\')">Conferma Prenotazione</button>' +
    '<button class="btn-annulla" onclick="closeModal()">Annulla</button>';
  document.getElementById('modalOverlay').className = 'modal-overlay open';
  setTimeout(function() { var el = document.getElementById('fNome'); if(el) el.focus(); }, 300);
}

window.closeModal = function() {
  document.getElementById('modalOverlay').className = 'modal-overlay';
  selectedPostazione = null;
  renderMap();
};

window.confermaPrenota = async function(posto, zona) {
  var nome    = (document.getElementById('fNome').value || '').trim();
  var cognome = (document.getElementById('fCognome').value || '').trim();
  var tel     = (document.getElementById('fTel').value || '').trim();
  var email   = (document.getElementById('fEmail').value || '').trim();
  if (!nome || !cognome || !tel || !email) { showToast('⚠️ Compila tutti i campi'); return; }

  var btn = document.getElementById('btnConferma');
  if (btn) { btn.disabled = true; btn.textContent = 'Salvataggio...'; }

  // verifica che non sia stato prenotato nel frattempo
  var snap = await getDoc(doc(db, 'prenotazioni', mappaData + '_' + posto));
  if (snap.exists()) {
    showToast('⚠️ Ombrellone già prenotato! Scegline un altro.');
    if (btn) { btn.disabled = false; btn.textContent = 'Conferma Prenotazione'; }
    closeModal();
    return;
  }

  var codice = generaCodice();
  var ts = new Date().toISOString();
  var prenotazione = {
    codice: codice, nome: nome, cognome: cognome, tel: tel, email: email,
    ts: ts, checkin: false, zona: zona, data: mappaData, posto: posto
  };

  try {
    await setDoc(doc(db, 'prenotazioni', mappaData + '_' + posto), prenotazione);
    selectedPostazione = null;
    showConferma(posto, codice, nome, cognome, tel, email, zona);
  } catch(e) {
    showToast('⚠️ Errore salvataggio. Riprova.');
    if (btn) { btn.disabled = false; btn.textContent = 'Conferma Prenotazione'; }
  }
};

function showConferma(posto, codice, nome, cognome, tel, email, zona) {
  var postazione = posto.replace('-','');
  var ora = new Date().toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit' });
  var dataLabel = formatDataIT(mappaData);
  var isFamily = zona === 'family';
  var zonaLabel = isFamily ? '👨‍👩‍👧 Zona Family' : '🌊 Zona Normale';
  var emailGestore = (config && config.emailGestore) ? config.emailGestore : '';
  var subject = 'Prenotazione ' + codice + ' – Ombrellone ' + postazione + ' – ' + dataLabel + ' – ' + (config ? config.nomeLido : '');
  var body = 'Nuova prenotazione!\n\nCodice: ' + codice + '\nData: ' + dataLabel + '\nOmbrellone: ' + postazione +
    '\nZona: ' + (isFamily?'Family':'Normale') + '\nNome: ' + nome + ' ' + cognome +
    '\nCellulare: ' + tel + '\nEmail: ' + email + '\nOra: ' + ora;
  var mailtoLink = 'mailto:' + emailGestore + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);

  document.getElementById('modalContent').innerHTML =
    '<div class="conferma-box">' +
    '<div class="conferma-icon">✅</div>' +
    '<div class="conferma-title">Prenotazione Confermata!</div>' +
    '<div class="conferma-sub">Mostra il codice alla cassa all\'arrivo</div>' +
    '<div class="codice-box">' +
    '<div class="codice-label">Il tuo Codice</div>' +
    '<div class="codice-value">' + codice + '</div>' +
    '<div class="codice-info">⛱️ Ombrellone ' + postazione + ' · ' + zonaLabel + '<br>📅 ' + dataLabel + '</div>' +
    '</div>' +
    '<div class="dettagli-prenota">👤 <strong>' + nome + ' ' + cognome + '</strong><br>📱 ' + tel + '<br>✉️ ' + email + '<br>⏰ Prenotato alle ' + ora + '</div>' +
    (emailGestore ? '<a class="btn-email" href="' + mailtoLink + '">📧 Invia conferma al gestore</a>' : '') +
    '<button class="btn-chiudi-conf" onclick="closeModal()">Chiudi</button>' +
    '</div>';
}

// avvio
window.onDataChange = onDataChange;
window.setOggi = setOggi;
init();
</script>
</body>
</html>
