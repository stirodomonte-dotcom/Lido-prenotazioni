.btn-annulla{width:100%;background:none;color:var(--text-light);border:none;padding:12px;font-size:14px;cursor:pointer;margin-top:4px}
.conf-box{text-align:center;padding:8px 0 4px}
.conf-icon{font-size:52px;margin-bottom:10px}

.codice-box{background:var(--sand);border-radius:14px;padding:18px 20px;margin-bottom:18px}

.det-box{font-size:14px;color:var(--text);margin-bottom:18px;line-height:1.8;text-align:left;background:#F7FAFC;border-radius:10px;padding:14px 16px}
.btn-blu{display:block;width:100%;background:var(--sea);color:white;border:none;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;text-decoration:none;text-align:center}
.btn-verde{display:block;width:100%;background:var(--green);color:white;border:none;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;text-align:center;text-decoration:none}
.btn-chiudi{width:100%;background:#EBF7FC;color:var(--sea);border:none;padding:13px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-light);font-size:14px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1A1A2E;color:white;padding:12px 22px;border-radius:24px;font-size:14px;font-weight:600;z-index:999;transition:transform .3s ease;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.25)}

<div class="header">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJ4vGsoBwtf8tv5Bvj4s17UX2sqUl-ExA",
  authDomain: "gestione-lido-7c399.firebaseapp.com",
  projectId: "gestione-lido-7c399",
  storageBucket: "gestione-lido-7c399.firebasestorage.app",
  messagingSenderId: "887337288477",
  appId: "1:887337288477:web:a0531335b5150d1f0917f4"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// EmailJS
const EJS_PUBLIC = '-2E1SqXDsJrGYmq6y';
const EJS_SERVICE = 'service_ahyar9f';
const EJS_TEMPLATE = 'template_s2zzk6s';
emailjs.init(EJS_PUBLIC);

// ===== STATO =====
var config = {
  nomeLido:'Lido Prenotazioni', emailGestore:'', whatsapp:'', pin:'1234',
  rows:[{name:'A',count:8,zona:'normale',moltiplicatore:1.5},{name:'B',count:8,zona:'normale',moltiplicatore:1.2},{name:'C',count:8,zona:'family',moltiplicatore:1.0},{name:'D',count:6,zona:'family',moltiplicatore:1.0}],
  attrezzature:[{id:'omb',nome:'Ombrellone',prezzoBase:8,icona:'⛱️'},{id:'lett',nome:'Lettino',prezzoBase:5,icona:'🛏️'},{id:'sdraio',nome:'Sdraio',prezzoBase:3,icona:'🪑'}],
  periodi:[{nome:'Bassa',dataInizio:'06-01',dataFine:'06-30',moltiplicatore:1.0},{nome:'Alta',dataInizio:'07-01',dataFine:'07-31',moltiplicatore:1.2},{nome:'Picco',dataInizio:'08-01',dataFine:'08-31',moltiplicatore:1.5}],
  moltiplicatoreWeekend:1.2
};
var utente = null;  // { uid, nome, cognome, tel, email, username, verificato }
var pendingOTP = null;  // { codice, email, scade, datiRegistrazione }
var prenotazioniMultiData = {};
var zonaAttiva = 'normale';
var dataInizio = '';
var dataFine = '';
var selectedPostazione = null;
var qtaAttr = {};

// ===== UTILS =====
function todayStr() {
  var d = new Date();
  return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
}
function formatIT(str) {
  if (!str) return '';
  var p = str.split('-');
  return p[2]+'/'+p[1]+'/'+p[0];
}
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(function(){ t.className='toast'; }, 2800);
}
function generaCodice() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var code = '';
  for (var i=0; i<5; i++) code += chars.charAt(Math.floor(Math.random()*chars.length));
  return code;
}
function generaOTP() {
  return Math.floor(100000 + Math.random()*900000).toString();
}
function getDateRange(inizio, fine) {
  var dates = [];
  var cur = new Date(inizio+'T12:00:00');
  var end = new Date(fine+'T12:00:00');
  while (cur <= end) {
    dates.push(cur.getFullYear()+'-'+('0'+(cur.getMonth()+1)).slice(-2)+'-'+('0'+cur.getDate()).slice(-2));
    cur.setDate(cur.getDate()+1);
  }
  return dates;
}
function numGiorni(inizio, fine) {
  if (!inizio || !fine) return 0;
  var a = new Date(inizio+'T12:00:00'), b = new Date(fine+'T12:00:00');
  var diff = Math.round((b-a)/(1000*60*60*24));
  return diff < 0 ? 0 : diff+1;
}
function formatEuro(val) {
  return parseFloat(val).toFixed(2).replace('.',',')+' €';
}
function getMoltiplicatoreFila(nomeFila) {
  var r = (config.rows||[]).find(function(r){ return r.name===nomeFila; });
  return r ? (r.moltiplicatore||1.0) : 1.0;
}
function getMoltiplicatorePeriodo(dataStr) {
  var mmdd = dataStr.slice(5);
  var p = (config.periodi||[]).find(function(p){ return mmdd>=p.dataInizio && mmdd<=p.dataFine; });
  return p ? p.moltiplicatore : 1.0;
}
function getMoltiplicatoreGiorno(dataStr) {
  var dow = new Date(dataStr+'T12:00:00').getDay();
  return (dow===0||dow===6) ? (config.moltiplicatoreWeekend||1.2) : 1.0;
}
function calcolaTotale(posto, dates) {
  if (!dates || !dates.length) return 0;
  var fila = posto.split('-')[0];
  var molFila = getMoltiplicatoreFila(fila);
  var tot = 0;
  dates.forEach(function(data) {
    var molP = getMoltiplicatorePeriodo(data);
    var molG = getMoltiplicatoreGiorno(data);
    (config.attrezzature||[]).forEach(function(attr) {
      var qty = qtaAttr[attr.id]||0;
      if (qty>0) tot += attr.prezzoBase*qty*molFila*molP*molG;
    });
  });
  return Math.round(tot*100)/100;
}
function initQtaAttr() {
  qtaAttr = {};
  (config.attrezzature||[]).forEach(function(a,i){ qtaAttr[a.id] = i===0 ? 1 : 0; });
}
function salvaUtenteLocale(u) {
  try { localStorage.setItem('lido_utente', JSON.stringify(u)); } catch(e){}
}
function caricaUtenteLocale() {
  try { var s=localStorage.getItem('lido_utente'); return s ? JSON.parse(s) : null; } catch(e){ return null; }
}

// ===== INIT =====
async function init() {
  // carica config
  try {
    var snap = await getDoc(doc(db,'config','lido'));
    if (snap.exists()) { config = snap.data(); }
    else { setDoc(doc(db,'config','lido'),config).catch(function(){}); }
  } catch(e) {}
  initQtaAttr();

  // controlla sessione
  utente = caricaUtenteLocale();
  if (utente && utente.verificato) {
    avviaApp();
  } else {
    mostraLogin();
  }
}

// ===== AUTH SCREENS =====
function mostraLogin() {
  utente = null;
  document.getElementById('headerSub').textContent = 'Accedi per prenotare';
  document.getElementById('headerUserBtn').style.display = 'none';
  var root = document.getElementById('appRoot');
  root.innerHTML = '';

  var screen = document.createElement('div'); screen.className = 'auth-screen';
  var box = document.createElement('div'); box.className = 'auth-box';

  box.innerHTML = '<div class="auth-logo">🌊</div><div class="auth-title">Bentornato!</div><div class="auth-sub">Accedi per prenotare il tuo ombrellone</div>';

  var fUser = mkAuthField('Username o Email','aLoginUser','text','mario.rossi');
  var fPass = mkAuthField('Password','aLoginPass','password','••••••••');
  var btnLogin = document.createElement('button'); btnLogin.className='btn-auth'; btnLogin.textContent='Accedi';
  var errEl = document.createElement('div'); errEl.className='auth-error'; errEl.id='loginErr';
  var btnReg = document.createElement('button'); btnReg.className='btn-link'; btnReg.textContent='Non hai un account? Registrati';

  btnLogin.onclick = function(){ doLogin(errEl); };
  btnReg.onclick = mostraRegistrazione;

  // enter su password
  fPass.querySelector('input').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(errEl); });

  box.appendChild(fUser); box.appendChild(fPass); box.appendChild(errEl);
  box.appendChild(btnLogin); box.appendChild(btnReg);
  screen.appendChild(box);
  root.appendChild(screen);
}

function mostraRegistrazione() {
  var root = document.getElementById('appRoot');
  root.innerHTML = '';
  var screen = document.createElement('div'); screen.className='auth-screen';
  var box = document.createElement('div'); box.className='auth-box';
  box.innerHTML = '<div class="auth-logo">📝</div><div class="auth-title">Crea Account</div><div class="auth-sub">Inserisci i tuoi dati per registrarti</div>';

  var fNome = mkAuthField('Nome','rNome','text','Mario');
  var fCognome = mkAuthField('Cognome','rCognome','text','Rossi');
  var fTel = mkAuthField('Cellulare','rTel','tel','+39 333 1234567');
  var fEmail = mkAuthField('Email','rEmail','email','mario@email.com');
  var fUser = mkAuthField('Username','rUsername','text','mario.rossi');
  var fPass = mkAuthField('Password (min. 6 caratteri)','rPass','password','••••••••');
  var errEl = document.createElement('div'); errEl.className='auth-error'; errEl.id='regErr';
  var btnReg = document.createElement('button'); btnReg.className='btn-auth'; btnReg.textContent='Registrati e verifica Email';
  var btnBack = document.createElement('button'); btnBack.className='btn-link'; btnBack.textContent='Hai gia un account? Accedi';

  btnReg.onclick = function(){ doRegistrazione(errEl); };
  btnBack.onclick = mostraLogin;

  box.appendChild(fNome); box.appendChild(fCognome); box.appendChild(fTel);
  box.appendChild(fEmail); box.appendChild(fUser); box.appendChild(fPass);
  box.appendChild(errEl); box.appendChild(btnReg); box.appendChild(btnBack);
  screen.appendChild(box);
  root.appendChild(screen);
}

function mostraVerificaOTP(email) {
  var root = document.getElementById('appRoot');
  root.innerHTML = '';
  var screen = document.createElement('div'); screen.className='auth-screen';
  var box = document.createElement('div'); box.className='auth-box';
  box.innerHTML = '<div class="auth-logo">📧</div><div class="auth-title">Verifica Email</div>';

  var otpBox = document.createElement('div'); otpBox.className='otp-box';
  var otpTxt = document.createElement('div'); otpTxt.className='otp-box-text'; otpTxt.textContent='Abbiamo inviato un codice a';
  var otpEmail = document.createElement('div'); otpEmail.className='otp-box-email'; otpEmail.textContent=email;
  otpBox.appendChild(otpTxt); otpBox.appendChild(otpEmail);

  var fOTP = mkAuthField('Codice di verifica (6 cifre)','otpCode','text','123456');

// ===== LOGIN =====
async function doLogin(errEl) {
  var userVal = (document.getElementById('aLoginUser').value||'').trim();
  var passVal = (document.getElementById('aLoginPass').value||'').trim();
  errEl.textContent = '';
  if (!userVal || !passVal) { errEl.textContent='Compila tutti i campi'; return; }

  var btn = document.querySelector('.btn-auth');
  if (btn) { btn.disabled=true; btn.textContent='Accesso in corso...'; }

  try {
    // cerca per username o email
    var snap1 = await getDocs(query(collection(db,'utenti'), where('username','==',userVal)));
    var snap2 = await getDocs(query(collection(db,'utenti'), where('email','==',userVal)));
    var uDoc = null;
    if (!snap1.empty) uDoc = snap1.docs[0].data();
    else if (!snap2.empty) uDoc = snap2.docs[0].data();

    if (!uDoc) { errEl.textContent='Utente non trovato'; if(btn){btn.disabled=false;btn.textContent='Accedi';} return; }
    if (!uDoc.verificato) { errEl.textContent='Email non verificata. Controlla la tua casella.'; if(btn){btn.disabled=false;btn.textContent='Accedi';} return; }
    if (uDoc.password !== btoa(passVal)) { errEl.textContent='Password errata'; if(btn){btn.disabled=false;btn.textContent='Accedi';} return; }

    utente = uDoc;
    salvaUtenteLocale(utente);
    avviaApp();
  } catch(e) {
    errEl.textContent='Errore connessione. Riprova.';
    if(btn){btn.disabled=false;btn.textContent='Accedi';}
  }
}

// ===== REGISTRAZIONE =====
async function doRegistrazione(errEl) {
  var nome = (document.getElementById('rNome').value||'').trim();
  var cognome = (document.getElementById('rCognome').value||'').trim();
  var tel = (document.getElementById('rTel').value||'').trim();
  var email = (document.getElementById('rEmail').value||'').trim().toLowerCase();
  var username = (document.getElementById('rUsername').value||'').trim().toLowerCase();
  var password = (document.getElementById('rPass').value||'').trim();

  errEl.textContent='';
  if (!nome||!cognome||!tel||!email||!username||!password) { errEl.textContent='Compila tutti i campi'; return; }
  if (password.length < 6) { errEl.textContent='Password minimo 6 caratteri'; return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { errEl.textContent='Email non valida'; return; }

  var btn = document.querySelector('.btn-auth');
  if (btn) { btn.disabled=true; btn.textContent='Invio codice...'; }

  try {
    // controlla se username o email esistono gia
    var su = await getDocs(query(collection(db,'utenti'), where('username','==',username)));
    if (!su.empty) { errEl.textContent='Username gia in uso'; if(btn){btn.disabled=false;btn.textContent='Registrati e verifica Email';} return; }
    var se = await getDocs(query(collection(db,'utenti'), where('email','==',email)));
    if (!se.empty) { errEl.textContent='Email gia registrata'; if(btn){btn.disabled=false;btn.textContent='Registrati e verifica Email';} return; }

    var dati = { nome:nome, cognome:cognome, tel:tel, email:email, username:username, password:btoa(password), verificato:false };
    await inviaOTP(email, dati, false);
    mostraVerificaOTP(email);
  } catch(e) {
    errEl.textContent='Errore: riprova tra poco';
    if(btn){btn.disabled=false;btn.textContent='Registrati e verifica Email';}
  }
}

async function inviaOTP(email, dati, isResend) {
  var otp = generaOTP();
  var scade = Date.now() + 10*60*1000; // 10 minuti
  pendingOTP = { codice:otp, email:email, scade:scade, datiRegistrazione:dati };

  // salva OTP su Firebase
  await setDoc(doc(db,'otp',email), { codice:otp, scade:scade, email:email });

  // invia email via EmailJS
  await emailjs.send(EJS_SERVICE, EJS_TEMPLATE, {
    email: email,
    passcode: otp,
    time: new Date(scade).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})
  });
}

// ===== VERIFICA OTP =====
async function doVerificaOTP(errEl) {
  var codiceInserito = (document.getElementById('otpCode').value||'').trim();
  errEl.textContent='';
  if (!codiceInserito || codiceInserito.length !== 6) { errEl.textContent='Inserisci il codice a 6 cifre'; return; }

  var btn = document.querySelector('.btn-auth');
  if (btn) { btn.disabled=true; btn.textContent='Verifica...'; }

  try {
    var email = pendingOTP ? pendingOTP.email : '';
    var otpSnap = await getDoc(doc(db,'otp',email));
    if (!otpSnap.exists()) { errEl.textContent='Codice scaduto. Richiedi un nuovo codice.'; if(btn){btn.disabled=false;btn.textContent='Verifica e Accedi';} return; }

    var otpData = otpSnap.data();
    if (Date.now() > otpData.scade) { errEl.textContent='Codice scaduto. Clicca "Rinvia codice".'; if(btn){btn.disabled=false;btn.textContent='Verifica e Accedi';} return; }
    if (otpData.codice !== codiceInserito) { errEl.textContent='Codice errato. Riprova.'; if(btn){btn.disabled=false;btn.textContent='Verifica e Accedi';} return; }

    // OTP corretto — crea/aggiorna utente
    var dati = pendingOTP.datiRegistrazione;
    dati.verificato = true;
    dati.uid = email;
    dati.dataRegistrazione = new Date().toISOString();
    await setDoc(doc(db,'utenti',email), dati);

    // elimina OTP usato
    try { await setDoc(doc(db,'otp',email), { usato:true }); } catch(e){}

    utente = dati;
    salvaUtenteLocale(utente);
    pendingOTP = null;
    showToast('Benvenuto ' + dati.nome + '!');
    avviaApp();
  } catch(e) {
    errEl.textContent='Errore verifica. Riprova.';
    if(btn){btn.disabled=false;btn.textContent='Verifica e Accedi';}
  }
}

async function loadPrenotazioniRange() {
  var dates = getDateRange(dataInizio,dataFine);
  prenotazioniMultiData = {};
  try {
    for (var i=0; i<dates.length; i++) {
      var snap = await getDocs(query(collection(db,'prenotazioni'), where('data','==',dates[i])));
      snap.forEach(function(d){
        var dd=d.data();
        if(!prenotazioniMultiData[dd.posto]) prenotazioniMultiData[dd.posto]=[];
        prenotazioniMultiData[dd.posto].push(dd.data);
      });
    }
  } catch(e){}
  renderMap();
}

function renderMap() {
  var wrapper = document.getElementById('mapWrapper');
  if (!wrapper) return;
  wrapper.innerHTML='';
  var rows=(config.rows||[]).filter(function(r){ return (r.zona||'normale')===zonaAttiva; });

  var dates=getDateRange(dataInizio,dataFine);

  var cont=document.createElement('div'); cont.className='map-container';
  var info=document.createElement('div'); info.className='map-info';

  info.textContent=ng===1?'Disponibilita per il '+formatIT(dataInizio):'Dal '+formatIT(dataInizio)+' al '+formatIT(dataFine);

  var maxC=0; rows.forEach(function(r){ if(r.count>maxC) maxC=r.count; });
  var hRow=document.createElement('div'); hRow.className='map-row';
  var sp=document.createElement('div'); sp.style.width='22px'; sp.style.flexShrink='0'; hRow.appendChild(sp);
  for(var c=1;c<=maxC;c++){ var cl=document.createElement('div'); cl.className='row-label'; cl.textContent=c; hRow.appendChild(cl); }
  grid.appendChild(hRow);

    var rowEl=document.createElement('div'); rowEl.className='map-row';
    var rl=document.createElement('div'); rl.className='row-label'; rl.textContent=row.name; rowEl.appendChild(rl);
    for(var ci=1;ci<=row.count;ci++){
      var posto=row.name+'-'+ci;
      var dateOcc=prenotazioniMultiData[posto]||[];
      var tuttiOcc=dates.length>0&&dateOcc.length>=dates.length;
      var parzOcc=dateOcc.length>0&&!tuttiOcc;
      var div=document.createElement('div'); div.className='ombrellone';
      if(selectedPostazione===posto){ div.className+=' selected'; div.innerHTML='<div class="oi">⛱️</div><div class="on">'+row.name+ci+'</div>'; }
      else if(tuttiOcc){ div.className+=' booked'; div.innerHTML='<div class="oi">⛱️</div><div class="on">'+row.name+ci+'</div>'; }
      else if(parzOcc){ div.className+=' partial'; div.innerHTML='<div class="oi">⛱️</div><div class="on">'+row.name+ci+'</div>'; }
      else{
        div.className+=(zonaAttiva==='family'?' free-family':' free');
        div.innerHTML='<div class="oi">⛱️</div><div class="on">'+row.name+ci+'</div>';
        (function(p){ div.onclick=function(){ apriModal(p); }; })(posto);
      }
      rowEl.appendChild(div);
    }
    for(var ci2=row.count+1;ci2<=maxC;ci2++){ var emp=document.createElement('div'); emp.className='ombrellone disabled'; emp.innerHTML='<div class="oi" style="opacity:.25">⛱️</div>'; rowEl.appendChild(emp); }
    grid.appendChild(rowEl);
  });
  cont.appendChild(grid); wrapper.appendChild(cont);
}

  (function(c,n,cog,pl,post){ btnSalva.onclick=function(){ scaricaBarcode(c,n,cog,pl,post); }; })(codice,utente.nome,utente.cognome,periodoLabel,postazione);
  modal.appendChild(btnSalva);
  if(emailGestore){
    var subject='Prenotazione '+codice+' - Omb. '+postazione+' - '+periodoLabel;
    var body='Nuova prenotazione!\n\nCodice: '+codice+'\nPeriodo: '+periodoLabel+'\nOmbrellone: '+postazione+'\nCliente: '+utente.nome+' '+utente.cognome+'\nTel: '+utente.tel+'\nEmail: '+utente.email+'\nTotale: '+formatEuro(totale);
    var btnEmail=document.createElement('a'); btnEmail.className='btn-verde';
    btnEmail.href='mailto:'+emailGestore+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);
    btnEmail.textContent='📧 Invia conferma al gestore';
    modal.appendChild(btnEmail);
  }
  var btnCh=document.createElement('button'); btnCh.className='btn-chiudi'; btnCh.textContent='Chiudi'; btnCh.onclick=chiudiModal; modal.appendChild(btnCh);
  setTimeout(function(){ var bc=document.getElementById('barcodeCanvas'); if(bc) try{drawBarcode(bc,codice);}catch(e){} },150);
}

// ===== BARCODE =====
function drawBarcode(canvas,text){
  var CHARS=' !"#$%&\'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~';
  var PAT=["11011001100","11001101100","11001100110","10010011000","10010001100","10001001100","10011001000","10011000100","10001100100","11001001000","11001000100","11000100100","10110011100","10011011100","10011001110","10111001100","10011101100","10011100110","11001110010","11001011100","11001001110","11011100100","11001110100","11101101110","11101001100","11100101100","11100100110","11101100100","11100110100","11100110010","11011011000","11011000110","11000110110","10100011000","10001011000","10001000110","10110001000","10001101000","10001100010","11010001000","11000101000","11000100010","10110111000","10110001110","10001101110","10111011000","10111000110","10001110110","11101110110","11010001110","11000101110","11011101000","11011100010","11011101110","11101011000","11101000110","11100010110","11101101000","11101100010","11100011010","11101111010","11001000010","11110001010","10100110000","10100001100","10010110000","10010000110","10000101100","10000100110","10110010000","10110000100","10011010000","10011000010","10000110100","10000110010","11000010010","11001010000","11110111010","11000010100","10001111010","10100111100","10010111100","10010011110","10111100100","10011110100","10011110010","11110100100","11110010100","11110010010","11011011110","11011110110","11110110110","10101111000","10100011110","10001011110","10111101000","10111100010","11110101000","11110100010","10111011110","10111101110","11101011110","11110101110","11010000100","11010010000","11010011100","1100011101011"];
  var codes=[104];
  for(var i=0;i<text.length;i++){var idx=CHARS.indexOf(text[i]);codes.push(idx<0?0:idx);}
  var chk=codes[0]; for(var j=1;j<codes.length;j++) chk+=j*codes[j];
  codes.push(chk%103); codes.push(106);
  var bars=''; for(var k=0;k<codes.length;k++) bars+=PAT[codes[k]];
  var bw=3,bh=80,mg=10,fs=16,w=bars.length*bw+mg*2,h=bh+mg*2+fs+4;
  canvas.width=w; canvas.height=h;
  var ctx=canvas.getContext('2d');
  ctx.fillStyle='#FFFFFF'; ctx.fillRect(0,0,w,h);
  ctx.fillStyle='#005F92';
  for(var bi=0;bi<bars.length;bi++){if(bars[bi]==='1') ctx.fillRect(mg+bi*bw,mg,bw,bh);}
  ctx.fillStyle='#1A1A2E'; ctx.font='bold '+fs+'px monospace'; ctx.textAlign='center';
  ctx.fillText(text,w/2,bh+mg+fs);
}

function scaricaBarcode(codice,nome,cognome,periodoLabel,postazione){
  var bcCanvas=document.createElement('canvas');
  try{drawBarcode(bcCanvas,codice);}catch(e){return;}
  var final=document.createElement('canvas');
  final.width=Math.max(bcCanvas.width,520); final.height=bcCanvas.height+36;
  var ctx=final.getContext('2d');
  ctx.fillStyle='#FFFFFF'; ctx.fillRect(0,0,final.width,final.height);
  ctx.drawImage(bcCanvas,Math.round((final.width-bcCanvas.width)/2),0);
  ctx.fillStyle='#1A1A2E'; ctx.font='bold 13px Arial'; ctx.textAlign='center';
  ctx.fillText(nome+' '+cognome+'  -  Omb. '+postazione+'  -  '+periodoLabel,final.width/2,bcCanvas.height+24);
  var link=document.createElement('a'); link.download='prenotazione-'+codice+'.png'; link.href=final.toDataURL('image/png'); link.click();
}

window.chiudiModal=chiudiModal;
init();
</script>
